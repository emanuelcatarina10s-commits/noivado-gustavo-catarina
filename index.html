<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Momento 💍</title>

<style>

body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fff0f5,#ffffff);
    color:#333;
    text-align:center;
}


/* TOPO */

header {
    padding:60px 20px;
    background:#111;
    color:white;
}

header h1 {
    font-size:45px;
    margin:0;
}

header p {
    font-size:20px;
}


/* BOTÕES */

.buttons {
    margin:30px;
}

button {
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:30px;
    background:#d63384;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover {
    transform:scale(1.05);
}


/* GALERIA */

.gallery {

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:30px;

}


.gallery img {

    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:20px;
    cursor:pointer;
    transition:.3s;

}


.gallery img:hover {

    transform:scale(1.05);

}



/* IMAGEM GRANDE */

.lightbox {

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:99;

}


.lightbox img {

max-width:90%;
max-height:90%;
border-radius:20px;

}


.close {

position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;

}


/* RODAPE */

footer {

padding:30px;
background:#111;
color:white;

}


</style>

</head>


<body>


<header>

<h1>💍 Nosso Momento</h1>

<p>Uma história feita de amor, respeito e memórias</p>

</header>



<div class="buttons">

<button onclick="document.getElementById('music').play()">
▶ Tocar Música
</button>


<button onclick="document.getElementById('gallery').scrollIntoView()">
📸 Ver Fotos
</button>


</div>



<audio id="music" controls>

<!-- COLOCA AQUI O LINK DA TUA MÚSICA -->

<source src="COLOQUE_AQUI_A_MUSICA.mp3">

</audio>



<h2>📸 Nossa Galeria</h2>


<div class="gallery" id="gallery">


<!-- COLOCA AS TUAS FOTOS AQUI -->


<img src="LINK_DA_FOTO_1" onclick="openImage(this.src)">

<img src="LINK_DA_FOTO_2" onclick="openImage(this.src)">

<img src="LINK_DA_FOTO_3" onclick="openImage(this.src)">

<img src="LINK_DA_FOTO_4" onclick="openImage(this.src)">



</div>




<!-- FOTO GRANDE -->

<div class="lightbox" id="lightbox">


<span class="close" onclick="closeImage()">×</span>


<img id="bigImage">


</div>




<footer>

<p>Feito com ❤️</p>

</footer>



<script>


function openImage(src){

document.getElementById("bigImage").src=src;

document.getElementById("lightbox").style.display="flex";

}



function closeImage(){

document.getElementById("lightbox").style.display="none";

}


</script>



</body>

</html>
