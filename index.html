<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Casamento ❤️</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Georgia',serif;
    background:#faf7f2;
    color:#333;
}


/* CAPA */

.hero{

height:100vh;
background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.45)),
url("COLOCA_AQUI_FOTO_DE_CAPA");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;

}


.hero h1{

font-size:70px;
letter-spacing:3px;

}


.hero p{

font-size:25px;

}



.btn{

display:inline-block;
margin-top:25px;
padding:15px 35px;
border-radius:40px;
background:white;
color:#333;
text-decoration:none;
transition:.3s;

}


.btn:hover{

transform:scale(1.08);

}



/* INTRO */

.section{

padding:80px 8%;
text-align:center;

}


.section h2{

font-size:45px;
font-weight:normal;

}



/* GALERIA */

.gallery{

columns:3 300px;
column-gap:20px;
padding:40px;

}


.gallery img{

width:100%;
margin-bottom:20px;
border-radius:20px;
cursor:pointer;
transition:.4s;

}


.gallery img:hover{

transform:scale(1.03);
box-shadow:0 20px 40px rgba(0,0,0,.2);

}



/* LIGHTBOX */

.lightbox{

display:none;
position:fixed;
z-index:999;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,.92);

align-items:center;
justify-content:center;

}


.lightbox img{

max-width:90%;
max-height:85%;
border-radius:20px;

}


.fechar{

position:absolute;
top:30px;
right:40px;
font-size:50px;
color:white;
cursor:pointer;

}



/* MUSICA */


.music{

margin:40px auto;
text-align:center;

}


footer{

background:#222;
color:white;
padding:40px;
text-align:center;

}


@media(max-width:700px){

.hero h1{

font-size:45px;

}

}

</style>

</head>


<body>



<section class="hero">


<div>

<h1>Emanuel ❤️ Catarina</h1>

<p>Uma história para recordar</p>


<a class="btn" href="#galeria">

Ver Momentos

</a>


</div>


</section>




<section class="section">


<h2>O Nosso Álbum</h2>

<p>
Cada fotografia guarda um momento especial.
</p>


</section>



<div class="music">


<audio controls autoplay loop>

<source src="COLOCA_AQUI_A_MUSICA.mp3">

</audio>


</div>




<div class="gallery" id="galeria">


<img src="LINK_FOTO_1" onclick="abrir(this.src)">

<img src="LINK_FOTO_2" onclick="abrir(this.src)">

<img src="LINK_FOTO_3" onclick="abrir(this.src)">

<img src="LINK_FOTO_4" onclick="abrir(this.src)">

<img src="LINK_FOTO_5" onclick="abrir(this.src)">

<img src="LINK_FOTO_6" onclick="abrir(this.src)">


</div>




<div class="lightbox" id="box">


<div class="fechar" onclick="fechar()">×</div>

<img id="imagemGrande">


</div>



<footer>

Feito com ❤️ para guardar memórias

</footer>




<script>


function abrir(src){

document.getElementById("imagemGrande").src=src;

document.getElementById("box").style.display="flex";

}



function fechar(){

document.getElementById("box").style.display="none";

}



</script>



</body>

</html>
