<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noivado Gustavo & Catarina</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #fff0f5, #fdfdfd);
      color: #333;
      text-align: center;
    }

    header {
      padding: 80px 20px;
      background: url('https://images.unsplash.com/photo-1523438097201-512ae7d59c1a?auto=format&fit=crop&w=1200&q=80') center/cover;
      color: white;
      position: relative;
    }

    header::after {
      content: "";
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.4);
    }

    header h1 {
      position: relative;
      font-family: 'Great Vibes', cursive;
      font-size: 60px;
      margin: 0;
    }

    header p {
      position: relative;
      font-size: 18px;
      margin-top: 10px;
    }

    .container {
      padding: 50px 20px;
    }

    .card {
      background: white;
      max-width: 800px;
      margin: auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      color: #c2185b;
      margin-top: 40px;
    }

    .countdown {
      font-size: 28px;
      margin-top: 20px;
      font-weight: bold;
      color: #444;
    }

    /* 💍 GALERIA */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 15px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 14px;
      color: #777;
    }

    .heart {
      color: #e91e63;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<header>
  <h1>Gustavo <span class="heart">❤</span> Catarina</h1>
  <p>Um amor que se tornou promessa 💍</p>
</header>

<div class="container">
  <div class="card">

    <h2>💍 O Nosso Noivado</h2>
    <p>Bem-vindos ao nosso momento especial. Este site celebra o nosso amor.</p>

    <h2>📅 Data do Evento</h2>
    <p><strong>Em breve</strong></p>

    <h2>⏳ Contagem Regressiva</h2>
    <div class="countdown" id="countdown">Carregando...</div>

    <!-- 💕 GALERIA -->
    <h2>📸 Nossa Galeria</h2>
    <div class="gallery">
      <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57?auto=format&fit=crop&w=800&q=80" />
      <img src="ChatGPT Image 29_05_2026, 03_23_15.png" />
    </div>

  </div>
</div>

<footer>
  Feito com ❤ para Gustavo & Catarina
</footer>

<script>
  const eventDate = new Date("2026-12-31").getTime();

  const x = setInterval(function() {
    const now = new Date().getTime();
    const distance = eventDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));

    document.getElementById("countdown").innerHTML =
      days + " dias restantes";

    if (distance < 0) {
      clearInterval(x);
      document.getElementById("countdown").innerHTML = "É HOJE 💍";
    }
  }, 1000);
</script>

</body>
</html>
